[components.schemas.CreateSpeechRequestSchema.properties.model]
type = "string"
enum = ["tts-kokoro", "tts-qwen3-0-6b", "tts-qwen3-1-7b", "tts-xai-v1", "tts-inworld-1-5-max", "tts-chatterbox-hd", "tts-orpheus", "tts-elevenlabs-turbo-v2-5", "tts-minimax-speech-02-hd", "tts-gemini-3-1-flash"]
