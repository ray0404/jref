[components.schemas.CreateSpeechRequestSchema.properties.prompt]
type = "string"
maxLength = 500
description = "A style prompt to control the emotion and delivery of the speech. Supported by models advertising `supportsPromptParam` (currently Qwen 3 TTS). Ignored by other models. Examples: \"Very happy.\", \"Sad and slow.\", \"Excited and energetic.\""
example = "Very happy."

[components.schemas.CreateSpeechRequestSchema.properties.response_format]
type = "string"
enum = ["mp3", "opus", "aac", "flac", "wav", "pcm"]
default = "mp3"
description = "The format to audio in."
example = "mp3"

[components.schemas.CreateSpeechRequestSchema.properties.speed]
type = "number"
minimum = 0.25
maximum = 4
default = 1
description = "The speed of the generated audio. Select a value from 0.25 to 4.0. 1.0 is the default."
example = 1

[components.schemas.CreateSpeechRequestSchema.properties.streaming]
type = "boolean"
default = false
description = "Should the content stream back sentence by sentence or be processed and returned as a complete audio file."
example = true

[components.schemas.CreateSpeechRequestSchema.properties.temperature]
type = "number"
minimum = 0
maximum = 2
description = "Sampling temperature for speech generation. Higher values produce more varied output. Supported by models advertising `supportsTemperatureParam` (Qwen 3, Orpheus, Chatterbox HD). Ignored by other models."
example = 0.9

[components.schemas.CreateSpeechRequestSchema.properties.top_p]
type = "number"
minimum = 0
maximum = 1
description = "Nucleus sampling parameter. Supported by models advertising `supportsTopPParam` (currently Qwen 3 TTS). Ignored by other models."
example = 1

[components.schemas.CreateSpeechRequestSchema.properties.voice]
default = "af_sky"
description = "The voice to use when generating the audio. Voices are model-specific: Kokoro (e.g. af_sky, af_bella, am_adam), Qwen 3 (e.g. Vivian, Serena, Dylan), xAI (eve, ara, rex, sal, leo), Orpheus (tara, leah, jess, leo, dan, mia, zac, zoe), Inworld (Craig, Ashley, ...), Chatterbox (Aurora, Blade, ...), ElevenLabs Turbo (Rachel, Aria, ...), MiniMax (WiseWoman, DeepVoiceMan, ...). You can also pass a cloned-voice handle (`vv_<id>`) returned by POST /v1/audio/voices to synthesize in a previously cloned voice; the handle must be paired with the same model used to create it. Using an incompatible voice returns a 400 error. Call GET /models/{id} to list voices for a specific model."
