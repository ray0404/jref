[paths."/responses".post]
description = "**Alpha** - This endpoint is currently available to Alpha testers only.\n\nCreates a model response using the Responses API format. This is an OpenAI-compatible endpoint for Venice text models.\n\n**E2EE Model Limitation** - E2EE-capable models are not supported on `/api/v1/responses`. Use `/api/v1/chat/completions` with the required E2EE headers instead.\n\n**Stateless Only** - This API is stateless. Each request is independent and no conversation state is persisted between requests. You must include the full conversation history in each request.\n\nThe Responses API provides a structured output format with typed blocks for:\n- **Reasoning**: Thought process and reasoning chains from reasoning models\n- **Messages**: The main text response from the model\n- **Function Calls**: Tool/function call outputs\n- **Web Search**: Results from web search if enabled\n\nThis endpoint supports streaming via Server-Sent Events when `stream: true` is set.\n\n**Authentication:** This endpoint accepts either a Bearer API key or an `X-Sign-In-With-X` header for x402 wallet-based authentication. When using x402, a `402 Payment Required` response indicates insufficient balance and includes top-up instructions."
operationId = "createResponse"
summary = "Create a response (Alpha)"
tags = ["Responses (Alpha)"]
