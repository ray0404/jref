[info]
description = "The Venice.ai API."
termsOfService = "https://venice.ai/legal/tos"
title = "Venice.ai API"
version = "20260508.221712"
x-guidance = "Venice.ai is an OpenAI-compatible inference API supporting text, image, audio, and video generation.\n\n**Authentication options:**\n- API Key: Use Bearer token in Authorization header\n- x402 Wallet: Use USDC credits via Ethereum wallet (no account required)\n\n**For x402 wallet access:**\n1. POST /x402/top-up without headers to get payment requirements\n2. Sign a USDC payment using the x402 SDK\n3. POST /x402/top-up with X-402-Payment header to add credits\n4. Call any inference endpoint with X-Sign-In-With-X header\n\n**Pricing:** Prepaid credits consumed per request. Check /models for available models and their capabilities."
openapi = "3.0.0"
[[security]]
[[servers]]
url = "https://api.venice.ai/api/v1"
[[tags]]
description = "Generate speech/audio, transcribe audio, and manage asynchronous audio generation jobs."
name = "Audio"
[[tags]]
description = "Given a list of messages comprising a conversation, the model will return a response. Supports multimodal inputs including text, images, audio (input_audio), and video (video_url) for compatible models."
name = "Chat"
[[tags]]
description = "List and describe the various models available in the API."
name = "Models"
[[tags]]
description = "Generate and manipulate images using AI models."
name = "Image"
[[tags]]
description = "Generate videos using AI models."
name = "Video"
[[tags]]
description = "List and retrieve character information for use in completions."
name = "Characters"
[[tags]]
description = "Billing and usage analytics. **Beta**: This API is currently in beta and may be unstable. Endpoints, request/response schemas, and behavior may change without notice."
name = "Billing"
[[tags]]
description = "Proxy JSON-RPC requests to blockchain nodes. Billed per credit."
name = "Crypto RPC"
[[tags]]
description = "Wallet-based API access using the x402 protocol. No API key required — authenticate with an Ethereum wallet.\n\n**How it works:**\n1. **Authenticate** — Send an `X-Sign-In-With-X` header (base64-encoded signed SIWE message) with any request. See the `siwx` security scheme for the exact format.\n2. **Top up** — `POST /x402/top-up` without a payment header returns payment requirements. Sign a USDC transfer on Base using the x402 SDK (`npm install x402`) and re-submit with the `X-402-Payment` header.\n3. **Use any endpoint** — All inference endpoints (chat, image, audio, video, embeddings) accept `siwx` as an alternative to `BearerAuth`. Charges are deducted from your USDC credit balance.\n4. **Monitor balance** — `GET /x402/balance/{walletAddress}` returns your current balance. The `X-Balance-Remaining` response header on inference calls also reports it.\n\n**Quick start (5 lines):**\n```\nimport { VeniceClient } from '@venice-ai/x402-client'\nconst venice = new VeniceClient(process.env.WALLET_KEY)\nawait venice.topUp(10) // $10 USDC on Base\nconst res = await venice.chat({ model: 'zai-org-glm-5-1', messages: [{ role: 'user', content: 'Hello!' }] })\n```\n\n**Payment:** USDC on Base (chain ID 8453). Minimum top-up: $5. Alternatively, stake DIEM tokens for daily credits (1 DIEM = $1/day)."
name = "x402"

[components]
[components.securitySchemes.BearerAuth]
bearerFormat = "JWT"
scheme = "bearer"
type = "http"

[components.securitySchemes.siwx]
description = "Wallet-based authentication using the x402 protocol (Sign-In-With-X / EIP-4361 SIWE).\n\n**Header format:** Base64-encoded JSON object with the following fields:\n- `address` — Ethereum wallet address (checksummed)\n- `message` — EIP-4361 SIWE message string (created with `SiweMessage.prepareMessage()`)\n- `signature` — Hex-encoded signature of the message, signed by the wallet's private key\n- `timestamp` — Unix timestamp in milliseconds\n- `chainId` — Chain ID (use `8453` for Base)\n\n**SIWE message fields:**\n- `domain`: `outerface.venice.ai`\n- `uri`: `https://outerface.venice.ai`\n- `version`: `\"1\"`\n- `chainId`: `8453`\n- `nonce`: Random 16-character hex string\n- `issuedAt` / `expirationTime`: ISO timestamps (recommended TTL: 10 minutes)\n- `statement`: `\"Sign in to Venice API\"`\n\n**Example (TypeScript):**\n```\nimport { Wallet } from 'ethers'\nimport { SiweMessage } from 'siwe'\n\nconst wallet = new Wallet(PRIVATE_KEY)\nconst msg = new SiweMessage({ domain: 'outerface.venice.ai', address: wallet.address, statement: 'Sign in to Venice API', uri: 'https://outerface.venice.ai', version: '1', chainId: 8453, nonce: crypto.randomUUID().replace(/-/g, '').slice(0, 16), issuedAt: new Date().toISOString(), expirationTime: new Date(Date.now() + 600000).toISOString() })\nconst signature = await wallet.signMessage(msg.prepareMessage())\nconst header = btoa(JSON.stringify({ address: wallet.address, message: msg.prepareMessage(), signature, timestamp: Date.now(), chainId: 8453 }))\n// Set header: X-Sign-In-With-X: <header>\n```\n\n**SDK:** `npm install @venice-ai/x402-client` provides `VeniceClient` and `createAuthFetch` which handle this automatically.\n\n**Billing:** x402 users pay from a prepaid USDC credit balance. Top up via `POST /x402/top-up`. When balance is insufficient, endpoints return `402` with structured top-up instructions."
in = "header"
name = "X-Sign-In-With-X"
type = "apiKey"

