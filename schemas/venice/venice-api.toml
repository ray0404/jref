[paths."/augment/search".post.responses.402]
description = "Insufficient balance. Response varies by authentication method:\n\n**API Key users:** Standard error response with `INSUFFICIENT_BALANCE` code. Top up your Venice balance at venice.ai.\n\n**x402 wallet users:** Structured response with `PAYMENT_REQUIRED` code containing:\n- `topUpInstructions`: Step-by-step guide to top up via x402 protocol\n- `siwxChallenge`: Sign-In-With-X challenge template for authentication\n- `supportedTokens` / `supportedChains`: Accepted payment methods\n\nThe `PAYMENT-REQUIRED` header also contains a base64-encoded JSON object with the same payment requirements for protocol-level discovery (x402 v2 spec)."

[paths."/augment/search".post.responses.402.headers.PAYMENT-REQUIRED]
description = "Base64-encoded JSON with x402 payment requirements and SIWX challenge. Present only for x402 wallet authentication. Decode to get payment instructions programmatically."
required = false

[paths."/augment/search".post.responses.402.headers.PAYMENT-REQUIRED.schema]
type = "string"
