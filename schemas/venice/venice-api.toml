example = true

[components.schemas.ChatCompletionRequest.properties.stream_options]
type = "object"

[components.schemas.ChatCompletionRequest.properties.stream_options.properties.include_usage]
type = "boolean"
description = "Whether to include usage information in the stream."

[components.schemas.ChatCompletionRequest.properties.temperature]
type = "number"
minimum = 0
maximum = 2
description = "What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. We generally recommend altering this or top_p but not both."
example = 0.7

[components.schemas.ChatCompletionRequest.properties.top_k]
type = "integer"
minimum = 0
description = "The number of highest probability vocabulary tokens to keep for top-k-filtering."
example = 40

[components.schemas.ChatCompletionRequest.properties.top_p]
type = "number"
minimum = 0
maximum = 1
description = "An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered."
example = 0.9

[components.schemas.ChatCompletionRequest.properties.user]
type = "string"
description = "This field is discarded on the request but is supported in the Venice API for compatibility with OpenAI clients."

[components.schemas.ChatCompletionRequest.properties.store]
type = "boolean"
description = "This field is accepted for OpenAI compatibility but is not used by Venice."

