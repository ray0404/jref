[components.schemas.QueueVideoRequest]
type = "object"
required = ["model", "prompt", "duration"]
description = "Request body for video generation. Available fields and valid values vary by model."

[components.schemas.QueueVideoRequest.properties.model]
type = "string"
description = "The model to use for video generation."
example = "seedance-2-0-text-to-video"

[components.schemas.QueueVideoRequest.properties.prompt]
type = "string"
minLength = 1
maxLength = 10000
description = "The prompt to use for video generation. Required for most models. The maximum length varies by model (default 2500 characters, up to 10000 for some models such as Seedance 2.0)."
example = "Commerce being conducted in the city of Venice, Italy."

[components.schemas.QueueVideoRequest.properties.negative_prompt]
type = "string"
maxLength = 10000
description = "Optional negative prompt. The maximum length varies by model (default 2500 characters, up to 10000 for some models)."
example = "low resolution, error, worst quality, low quality, defects"

[components.schemas.QueueVideoRequest.properties.duration]
type = "string"
enum = ["2s", "3s", "4s", "5s", "6s", "7s", "8s", "9s", "10s", "11s", "12s", "13s", "14s", "15s", "16s", "18s", "20s", "25s", "30s", "1 gen", "Auto"]
description = "The duration of the video to generate. Available options vary by model."
example = "5s"

[components.schemas.QueueVideoRequest.properties.aspect_ratio]
type = "string"
enum = ["1:1", "2:3", "3:2", "3:4", "4:3", "9:16", "16:9", "21:9"]
description = "The aspect ratio of the video. Available options vary by model. Some models do not support aspect_ratio."
example = "16:9"

[components.schemas.QueueVideoRequest.properties.resolution]
type = "string"
enum = ["256p", "360p", "480p", "540p", "580p", "720p", "1080p", "1440p", "2160p", "4k", "2x", "4x", "true_1080p"]
description = "The resolution of the video. Available options vary by model. Some models do not support resolution. Use upscale_factor for upscale models."
example = "720p"

[components.schemas.QueueVideoRequest.properties.upscale_factor]
type = "integer"
description = "For upscale models only. 1 = quality enhancement, 2 = double resolution (default), 4 = quadruple."
enum = [1, 2, 4]
default = 2
example = 2

[components.schemas.QueueVideoRequest.properties.audio]
type = "boolean"
default = true
description = "For models which support audio generation and configuration. Defaults to true."
example = true

[components.schemas.QueueVideoRequest.properties.image_url]
type = "string"
description = "For image-to-video models, the reference image. Must be a URL (http/https) or a data URL (data:image/...)."
example = "data:image/png;base64,iVBORw0K..."

[components.schemas.QueueVideoRequest.properties.end_image_url]
type = "string"
description = "For models that support end images or transitions, the end frame image. Must be a URL or data URL."
example = "data:image/png;base64,iVBORw0K..."

[components.schemas.QueueVideoRequest.properties.audio_url]
type = "string"
description = "For models that support audio input, background music. Must be a URL or data URL. Supported: WAV, MP3. Max: 30s, 15MB."
example = "data:audio/mpeg;base64,SUQzBAA..."

[components.schemas.QueueVideoRequest.properties.video_url]
type = "string"
description = "For models that support video input (video-to-video, upscale). Must be a URL or data URL. Supported: MP4, MOV, WebM."
example = "data:video/mp4;base64,AAAAFGZ0eXA..."

[components.schemas.QueueVideoRequest.properties.reference_image_urls]
type = "array"
maxItems = 9
description = "For models with reference image support, up to 9 images for character/style consistency. Each must be a URL or data URL."
example = ["data:image/png;base64,iVBORw0K..."]

[components.schemas.QueueVideoRequest.properties.reference_image_urls.items]
type = "string"

[components.schemas.QueueVideoRequest.properties.elements]
type = "array"
maxItems = 4
description = "For models with advanced element support (e.g., Kling O3 R2V). Up to 4 elements defining characters/objects. Reference in prompt as @Element1, @Element2, etc."
[[components.schemas.QueueVideoRequest.properties.elements.example]]
frontal_image_url = "data:image/png;base64,iVBORw0K..."
reference_image_urls = ["data:image/png;base64,iVBORw0K..."]

[components.schemas.QueueVideoRequest.properties.elements.items]
type = "object"

[components.schemas.QueueVideoRequest.properties.elements.items.properties.frontal_image_url]
type = "string"

[components.schemas.QueueVideoRequest.properties.elements.items.properties.reference_image_urls]
type = "array"
maxItems = 3

[components.schemas.QueueVideoRequest.properties.elements.items.properties.reference_image_urls.items]
type = "string"

[components.schemas.QueueVideoRequest.properties.elements.items.properties.video_url]
type = "string"

[components.schemas.QueueVideoRequest.properties.scene_image_urls]
type = "array"
maxItems = 4
description = "For models with advanced element support. Up to 4 scene reference images. Reference in prompt as @Image1, @Image2, etc."
example = ["data:image/png;base64,iVBORw0K..."]

[components.schemas.QueueVideoRequest.properties.scene_image_urls.items]
type = "string"

