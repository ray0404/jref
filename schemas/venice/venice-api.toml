[components.schemas.GenerateImageRequest]
type = "object"
required = ["model", "prompt"]
additionalProperties = false

[components.schemas.GenerateImageRequest.properties.cfg_scale]
type = "number"
minimum = 0
exclusiveMinimum = true
maximum = 20
description = "CFG scale parameter. Higher values lead to more adherence to the prompt."
example = 7.5

[components.schemas.GenerateImageRequest.properties.embed_exif_metadata]
type = "boolean"
default = false
description = "Embed prompt generation information into the image's EXIF metadata."
example = false

[components.schemas.GenerateImageRequest.properties.format]
type = "string"
enum = ["jpeg", "png", "webp"]
default = "webp"
description = "The image format to return. WebP are smaller and optimized for web use. PNG are higher quality but larger in file size. "
example = "webp"

[components.schemas.GenerateImageRequest.properties.height]
type = "integer"
minimum = 0
exclusiveMinimum = true
maximum = 1280
default = 1024
description = "Height of the generated image."
example = 1024

[components.schemas.GenerateImageRequest.properties.hide_watermark]
type = "boolean"
default = false
description = "Whether to hide the Venice watermark. Venice may ignore this parameter for certain generated content."
example = false

[components.schemas.GenerateImageRequest.properties.inpaint]
nullable = true
description = "This feature is deprecated and was disabled on May 19th, 2025. A revised in-painting API will be launched in the near future."
deprecated = true

[components.schemas.GenerateImageRequest.properties.lora_strength]
type = "integer"
minimum = 0
maximum = 100
description = "Lora strength for the model. Only applies if the model uses additional Loras."
example = 50

[components.schemas.GenerateImageRequest.properties.model]
type = "string"
description = "The model to use for image generation."
example = "grok-imagine-image"

[components.schemas.GenerateImageRequest.properties.negative_prompt]
type = "string"
maxLength = 7500
description = "A description of what should not be in the image. Character limit is model specific and is listed in the promptCharacterLimit constraint in the model list endpoint."
example = "Clouds, Rain, Snow"

[components.schemas.GenerateImageRequest.properties.prompt]
type = "string"
minLength = 1
maxLength = 7500
description = "The description for the image. Character limit is model specific and is listed in the promptCharacterLimit setting in the model list endpoint."
example = "A beautiful sunset over a mountain range"

[components.schemas.GenerateImageRequest.properties.return_binary]
type = "boolean"
default = false
description = "Whether to return binary image data instead of base64."
example = false

[components.schemas.GenerateImageRequest.properties.variants]
type = "integer"
minimum = 1
maximum = 4
description = "Number of images to generate (1–4). Only supported when return_binary is false."
example = 3

[components.schemas.GenerateImageRequest.properties.safe_mode]
type = "boolean"
default = true
description = "Whether to use safe mode. If enabled, this will blur images that are classified as having adult content."
example = false

[components.schemas.GenerateImageRequest.properties.seed]
type = "integer"
minimum = -999999999
maximum = 999999999
default = 0
description = "Random seed for generation. If not provided, a random seed will be used."
example = 123456789

[components.schemas.GenerateImageRequest.properties.steps]
type = "integer"
default = 8
description = "Number of inference steps. This model does not support steps - this field is ignored."
example = 8

[components.schemas.GenerateImageRequest.properties.style_preset]
type = "string"
description = "An image style to apply to the image. Visit https://docs.venice.ai/api-reference/endpoint/image/styles for more details."
example = "3D Model"

[components.schemas.GenerateImageRequest.properties.aspect_ratio]
type = "string"
description = "Aspect ratio (utilized by certain image models including Nano Banana). Examples: \"1:1\", \"16:9\"."
example = "1:1"

[components.schemas.GenerateImageRequest.properties.resolution]
type = "string"
description = "Resolution (utilized by certain image models including Nano Banana). Examples: \"1K\", \"2K\", \"4K\"."
example = "1K"

[components.schemas.GenerateImageRequest.properties.enable_web_search]
type = "boolean"
description = "Enable web search for the image generation task. This will allow the model to use the latest information from the web to generate the image. Only supported by certain models. If web search is used, additional credits are getting charged."
example = false

[components.schemas.GenerateImageRequest.properties.width]
type = "integer"
minimum = 0
exclusiveMinimum = true
maximum = 1280
default = 1024
description = "Width of the generated image."
example = 1024

[components.schemas.SimpleGenerateImageRequest]
type = "object"
required = ["prompt"]
additionalProperties = false

[components.schemas.SimpleGenerateImageRequest.properties.background]
type = "string"
nullable = true
enum = ["transparent", "opaque", "auto"]
default = "auto"
description = "This parameter is not used in Venice image generation but is supported for compatibility with OpenAI API"
example = "auto"

[components.schemas.SimpleGenerateImageRequest.properties.model]
type = "string"
default = "default"
description = "The model to use for image generation. Defaults to Venice's default image model. If a non-existent model is specified (ie an OpenAI model name), it will default to Venice's default image model."
example = "grok-imagine-image"

[components.schemas.SimpleGenerateImageRequest.properties.moderation]
type = "string"
nullable = true
enum = ["low", "auto"]
default = "auto"
description = "auto enables safe venice mode which will blur out adult content. low disables safe venice mode."
example = "auto"

[components.schemas.SimpleGenerateImageRequest.properties.n]
type = "integer"
nullable = true
minimum = 1
maximum = 1
default = 1
description = "Number of images to generate. Venice presently only supports 1 image per request."
example = 1

[components.schemas.SimpleGenerateImageRequest.properties.output_compression]
type = "integer"
nullable = true
minimum = 0
maximum = 100
default = 100
description = "This parameter is not used in Venice image generation but is supported for compatibility with OpenAI API"

[components.schemas.SimpleGenerateImageRequest.properties.output_format]
type = "string"
enum = ["jpeg", "png", "webp"]
default = "png"
description = "Output format for generated images"
example = "png"

[components.schemas.SimpleGenerateImageRequest.properties.prompt]
type = "string"
minLength = 1
maxLength = 1500
description = "A text description of the desired image."
example = "A beautiful sunset over mountain ranges"

[components.schemas.SimpleGenerateImageRequest.properties.quality]
type = "string"
nullable = true
enum = ["auto", "high", "medium", "low", "hd", "standard"]
default = "auto"
description = "This parameter is not used in Venice image generation but is supported for compatibility with OpenAI API"
example = "auto"

[components.schemas.SimpleGenerateImageRequest.properties.response_format]
type = "string"
nullable = true
enum = ["b64_json", "url"]
default = "b64_json"
description = "Response format. URL will be a data URL."
example = "b64_json"

[components.schemas.SimpleGenerateImageRequest.properties.size]
type = "string"
nullable = true
enum = ["auto", "256x256", "512x512", "1024x1024", "1536x1024", "1024x1536", "1792x1024", "1024x1792"]
default = "auto"
description = "Size of generated images. Default is 1024x1024"
example = "1024x1024"

[components.schemas.SimpleGenerateImageRequest.properties.style]
type = "string"
nullable = true
enum = ["vivid", "natural"]
default = "natural"
description = "This parameter is not used in Venice image generation but is supported for compatibility with OpenAI API"
example = "natural"

[components.schemas.SimpleGenerateImageRequest.properties.user]
type = "string"
description = "This parameter is not used in Venice image generation but is supported for compatibility with OpenAI API"
example = "user123"

[components.schemas.UpscaleImageRequest]
type = "object"
required = ["image"]
additionalProperties = false
description = "Upscale or enhance an image based on the supplied parameters. Using a scale of 1 with enhance enabled will only run the enhancer."

[components.schemas.UpscaleImageRequest.properties.enhance]
default = "false"
description = "Whether to enhance the image using Venice's image engine during upscaling. Must be true if scale is 1."
example = true
[[components.schemas.UpscaleImageRequest.properties.enhance.anyOf]]
type = "boolean"
[[components.schemas.UpscaleImageRequest.properties.enhance.anyOf]]
type = "string"
enum = ["true", "false"]

[components.schemas.UpscaleImageRequest.properties.enhanceCreativity]
type = "number"
nullable = true
minimum = 0
maximum = 1
default = 0.5
description = "Higher values let the enhancement AI change the image more. Setting this to 1 effectively creates an entirely new image."
example = 0.5

[components.schemas.UpscaleImageRequest.properties.enhancePrompt]
type = "string"
maxLength = 1500
description = "The text to image style to apply during prompt enhancement. Does best with short descriptive prompts, like gold, marble or angry, menacing."
example = "gold"

[components.schemas.UpscaleImageRequest.properties.image]
description = "The image to upscale. Can be either a file upload or a base64-encoded string. Image dimensions must be at least 65536 pixels and final dimensions after scaling must not exceed 16777216 pixels. File size must be less than 25MB."
[[components.schemas.UpscaleImageRequest.properties.image.anyOf]]
[[components.schemas.UpscaleImageRequest.properties.image.anyOf]]
type = "string"

[components.schemas.UpscaleImageRequest.properties.replication]
type = "number"
nullable = true
minimum = 0
maximum = 1
default = 0.35
description = "How strongly lines and noise in the base image are preserved. Higher values are noisier but less plastic/AI \"generated\"/hallucinated. Must be between 0 and 1."
example = 0.35

[components.schemas.UpscaleImageRequest.properties.scale]
type = "number"
minimum = 1
maximum = 4
default = 2
description = "The scale factor for upscaling the image. Must be a number between 1 and 4. Scale of 1 requires enhance to be set true and will only run the enhancer. Scale must be > 1 if enhance is false. A scale of 4 with large images will result in the scale being dynamically set to ensure the final image stays within the maximum size limits."
example = 2

[components.schemas.UpscaleImageRequest.example]
enhance = true
enhanceCreativity = 0.5
enhancePrompt = "gold"
image = "iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAIAAAB7GkOtAAAAIGNIUk0A..."
scale = 2

